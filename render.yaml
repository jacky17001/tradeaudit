services:
  - type: web
    name: tradeaudit-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: CORS_ORIGINS
        sync: false
      - key: TRADEAUDIT_DB_PATH
        sync: false
